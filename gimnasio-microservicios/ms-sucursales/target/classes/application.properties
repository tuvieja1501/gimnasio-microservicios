# ====== Servidor ======
server.port=8090
spring.application.name=ms-sucursales

# ====== Base de datos PostgreSQL ======
spring.datasource.url=jdbc:postgresql://localhost:5432/gimnasio_sucursales
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ====== JPA / Hibernate ======
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ====== Migraciones ======
# Se ejecuta el script V1__init.sql ubicado en db/migration al iniciar.
# El equipo puede ejecutarlo manualmente o dejar que Hibernate cree el schema.
spring.sql.init.mode=never

# ====== Logging ======
logging.level.com.gimnasio=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
